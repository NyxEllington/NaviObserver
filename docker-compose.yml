version: '3.8'

services:
  naviobserver:
    image: ghcr.io/nyxellington/naviobserver:latest
    container_name: naviobserver
    ports:
      - "3000:3000"
    environment:
      # Navidrome Server Configuration
      # Set these via environment variables or .env file
      NAVIDROME_URL: ${NAVIDROME_URL:-http://host.docker.internal:4533}
      NAVIDROME_USERNAME: ${NAVIDROME_USERNAME}
      NAVIDROME_PASSWORD: ${NAVIDROME_PASSWORD}
      
      # Server Configuration (Optional)
      PORT: ${PORT:-3000}
      UPDATE_INTERVAL: ${UPDATE_INTERVAL:-2000}
    restart: unless-stopped
    
    # Build from GitHub repository (alternative to using image)
    # Uncomment the build section below and comment out the image line above
    # if you want to build from source instead
    # build:
    #   context: https://github.com/NyxEllington/NaviObserver.git
    #   dockerfile: Dockerfile
