<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navidrome Now Playing</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <div id="overlay" class="overlay visible">
    <div class="card">
      <div class="card-background" id="cardBackground"></div>
      
      <!-- Album Art -->
      <div class="album-container">
        <div class="album-glow"></div>
        <img id="albumArt" class="album-art" src="" alt="Album Art">
        <div id="placeholderArt" class="placeholder-art">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polygon points="10 8 16 12 10 16 10 8"></polygon>
          </svg>
          <span>No Music Playing</span>
        </div>
      </div>
      
      <!-- Track Info -->
      <div class="info">
        <div class="badge">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
          </svg>
          NOW PLAYING
        </div>
        
        <h1 id="title" class="title"><span class="title-inner"></span></h1>
        <h2 id="artist" class="artist">Artist Name</h2>
        <p id="album" class="album">Album Name</p>
        
        <div class="meta">
          <span id="year" class="meta-item"></span>
          <span id="genre" class="meta-item"></span>
        </div>
        
        <!-- Progress Bar -->
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
          <div class="progress-time">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>
      </div>
      
      <!-- Equalizer Bars -->
      <div class="equalizer">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
      
    </div>
  </div>

  <script>
    // Elements
    const overlay = document.getElementById('overlay');
    const albumArt = document.getElementById('albumArt');
    const cardBackground = document.getElementById('cardBackground');
    const title = document.getElementById('title');
    const artist = document.getElementById('artist');
    const album = document.getElementById('album');
    const year = document.getElementById('year');
    const genre = document.getElementById('genre');
    const progressBar = document.getElementById('progressBar');
    const currentTime = document.getElementById('currentTime');
    const duration = document.getElementById('duration');

    let currentId = null;
    let ws = null;
    let reconnectTimeout = null;
    let trackStartTime = null;
    let trackDuration = 0;
    let progressInterval = null;

    // Connect to WebSocket
    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);

      ws.onopen = () => {
        console.log('✅ Connected to server');
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'update') {
            updateDisplay(data.track);
          }
        } catch (error) {
          console.error('Error parsing message:', error);
        }
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
      };

      ws.onclose = () => {
        console.log('❌ Disconnected. Reconnecting in 3s...');
        reconnectTimeout = setTimeout(connect, 3000);
      };
    }

    // Update the overlay display
    function updateDisplay(track) {
      const placeholderArt = document.getElementById('placeholderArt');
      
      if (!track) {
        // Keep overlay visible but show idle state
        currentId = null;
        title.querySelector('.title-inner').textContent = 'No music playing';
        artist.textContent = 'Waiting for track...';
        album.textContent = '';
        year.textContent = '';
        genre.textContent = '';
        albumArt.style.display = 'none';
        placeholderArt.style.display = 'flex';
        progressBar.style.width = '0%';
        currentTime.textContent = '0:00';
        duration.textContent = '0:00';
        if (progressInterval) clearInterval(progressInterval);
        return;
      }

      // Check if it's a different track
      if (track.id === currentId) {
        return;
      }

      currentId = track.id;

      // Update title with marquee effect
      const titleText = track.title || 'Unknown Title';
      const titleInner = title.querySelector('.title-inner');
      
      // Remove scrolling animation first
      title.classList.remove('scrolling');
      titleInner.textContent = titleText;
      
      // Force a reflow to restart the animation cleanly
      void titleInner.offsetWidth;
      
      // Use requestAnimationFrame for smoother measurement
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const titleWidth = titleInner.scrollWidth;
          const containerWidth = title.clientWidth;
          
          if (titleWidth > containerWidth + 10) { // Add small buffer
            // Create seamless loop by duplicating
            titleInner.textContent = titleText + '    ' + titleText;
            
            // Use another RAF to ensure text is rendered before adding animation
            requestAnimationFrame(() => {
              title.classList.add('scrolling');
            });
          }
        });
      });
      
      // Update other text
      artist.textContent = track.artist || 'Unknown Artist';
      album.textContent = track.album || 'Unknown Album';
      
      // Update metadata
      year.textContent = track.year || '';
      year.style.display = track.year ? 'inline-block' : 'none';
      
      genre.textContent = track.genre || '';
      genre.style.display = track.genre ? 'inline-block' : 'none';
      
      // Update album art
      if (track.coverArt) {
        const img = new Image();
        img.onload = () => {
          albumArt.style.opacity = '0';
          placeholderArt.style.display = 'none';
          setTimeout(() => {
            albumArt.src = track.coverArt;
            albumArt.style.display = 'block';
            albumArt.style.opacity = '1';
            cardBackground.style.backgroundImage = `url(${track.coverArt})`;
            cardBackground.style.opacity = '1';
          }, 300);
        };
        img.onerror = () => {
          console.error('Failed to load album art');
          albumArt.style.display = 'none';
          placeholderArt.style.display = 'flex';
          cardBackground.style.opacity = '0';
        };
        img.src = track.coverArt;
      } else {
        albumArt.style.display = 'none';
        placeholderArt.style.display = 'flex';
        cardBackground.style.opacity = '0';
      }

      // Update progress bar
      if (track.duration) {
        trackDuration = track.duration;
        trackStartTime = Date.now();
        duration.textContent = formatTime(track.duration);
        
        if (progressInterval) clearInterval(progressInterval);
        updateProgress();
        progressInterval = setInterval(updateProgress, 1000);
      }

      // Keep overlay always visible
      overlay.classList.add('visible');
    }

    // Update progress bar
    function updateProgress() {
      if (!trackStartTime || !trackDuration) return;
      
      const elapsed = Math.floor((Date.now() - trackStartTime) / 1000);
      const percent = Math.min((elapsed / trackDuration) * 100, 100);
      
      progressBar.style.width = percent + '%';
      currentTime.textContent = formatTime(elapsed);
    }

    // Format time (seconds to MM:SS)
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return mins + ':' + (secs < 10 ? '0' : '') + secs;
    }

    // Start connection
    connect();

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (ws) ws.close();
      if (reconnectTimeout) clearTimeout(reconnectTimeout);
      if (progressInterval) clearInterval(progressInterval);
    });
  </script>
</body>
</html>
