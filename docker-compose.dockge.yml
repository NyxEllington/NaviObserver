version: '3.8'

services:
  naviobserver:
    image: ghcr.io/nyxellington/naviobserver:latest
    container_name: naviobserver
    pull_policy: always
    ports:
      - "3000:3000"
    environment:
      # Navidrome Server Configuration
      # Set these in Dockge's environment variables section
      NAVIDROME_URL: ${NAVIDROME_URL:-http://host.docker.internal:4533}
      NAVIDROME_USERNAME: ${NAVIDROME_USERNAME}
      NAVIDROME_PASSWORD: ${NAVIDROME_PASSWORD}
      
      # Server Configuration (Optional)
      PORT: ${PORT:-3000}
      UPDATE_INTERVAL: ${UPDATE_INTERVAL:-2000}
    restart: unless-stopped
    labels:
      - "com.dockge.description=Navidrome Now Playing Overlay"
      - "com.dockge.icon=https://raw.githubusercontent.com/NyxEllington/NaviObserver/main/public/overlay.html"
